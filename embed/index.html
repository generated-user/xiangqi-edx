<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Xiangqi Embed</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #root { width: 100%; height: 100vh; display:flex; flex-direction:column; }
    #boardWrap { flex: 1; display:flex; align-items:center; justify-content:center; padding:12px; }
    .controls { padding:8px; display:flex; gap:8px; align-items:center; }
  </style>
</head>
<body>
  <div id="root">
    <div class="controls">
      <select id="modeSelect">
        <option value="free">Free (no rules)</option>
        <option value="rule">Piece-rules only</option>
        <option value="regular">Regular (legal moves)</option>
        <option value="puzzle">Puzzle (sequence)</option>
        <option value="vs">Play vs Engine</option>
      </select>
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="hint">Hint</button>
    </div>
    <div id="boardWrap"><div id="boardContainer" style="width:640px;height:720px"></div></div>
    <div class="controls"><div id="status">Ready</div></div>
  </div>

  <script type="module" src="./embed.js"></script>
</body>
</html>
